<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FantaMondiale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Sfondo a gradiente ispirato alla brand identity ufficiale del Mondiale 2026 */
            background: radial-gradient(circle at center, #1a1b4b 0%, #08091a 100%);
            background-attachment: fixed;
        }
        
        /* Card responsive personalizzata */
        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            background: #ffffff;
            border-top: 5px solid #2e7d32; /* Richiamo verde ufficiale del tuo fanta */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
        }

        /* Tema Verde FantaMondiale */
        .text-fanta {
            color: #2e7d32 !important;
        }
        
        .btn-fanta {
            background-color: #2e7d32 !important;
            border-color: #2e7d32 !important;
            color: #ffffff !important;
            transition: all 0.2s ease-in-out;
        }
        
        .btn-fanta:hover {
            background-color: #1b5e20 !important;
            border-color: #1b5e20 !important;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }

        /* Focus personalizzato per gli input della password e dell'username */
        .form-control:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 0.25rem rgba(46, 125, 50, 0.25);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3" style="min-height: 100vh;">
    
    <div class="card p-4 border-0 login-card">
        <h2 class="text-center text-fanta fw-bold mb-2 fs-3">🏆 FantaMondiale</h2>
        <p class="text-muted text-center small mb-4">Inserisci le tue credenziali per accedere</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} text-center py-2 small fw-bold mb-3" role="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary small">Nome Allenatore</label>
                <input type="text" name="username" class="form-control form-control-lg fs-6" required placeholder="Es. Pep Guardiola">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold text-secondary small">Password</label>
                <input type="password" name="password" class="form-control form-control-lg fs-6" required placeholder="Es. ••••••••">
            </div>
            <button type="submit" class="btn btn-fanta w-100 fw-bold btn-lg fs-6 py-2 shadow-sm">Accedi alla Squadra 🚀</button>
        </form>
    </div>

</body>
</html>
